<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CampusConnect PC Kinyanjui</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <header>
        <img src="https://kinyanjuitechnical.ac.ke/inc/french/training.jpg" alt="School Logo" id="logo">
        <h1>PC KINYANJUI CAMPUS PORTAL</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="register.html" class="active">Register</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="registration-form-section">
            <h2>Event Registration</h2>
            <p>Fill out the details below to reserve your spot for upcoming campus events.</p>

            <form id="contactForm">
                <label for="adm">Student Admission Number:</label>
                <input type="text" id="adm" name="adm" placeholder="Enter your Admission No.">

                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">

                <label for="event">Select Event:</label>
                <select id="event" name="event">
                    <option value="cultural">Cultural Week</option>
                    <option value="sports">Sports Day</option>
                    <option value="election">Students' Election</option>
                    <option value="tree">Tree Planting Day</option>
                </select>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="example@student.com">

                <button type="submit" id="submitBtn">Submit Registration</button>
            </form>

            <div id="successMessage" style="display:none;" class="success-box">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PC KINYANJUI CAMPUS PORTAL. All rights reserved.</p>
        <div class="social-icons">
            <a href="#">Facebook</a> | <a href="#">Twitter</a> | <a href="#">Instagram</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
